<div class="modal-header">
  <h5 class="modal-title">{{ 'APPOINTMENT.ADD' | translate }}</h5>
  <button type="button" class="btn-close" (click)="dismissModal()"></button>
</div>

<div class="modal-body bg-light">
  <form [formGroup]="form">
    <div class="row p-3">
      
      <div class="col-12 mb-3">
        <label class="form-label fw-bold">Patient *</label>
        <select class="form-select" formControlName="patientId" [class.is-invalid]="f['patientId'].touched && f['patientId'].invalid">
          <option [value]="0" disabled>-- Sélectionner le patient --</option>
          @for (p of patients; track p.id) {
            <option [value]="p.id">{{ p.firstName }} {{ p.lastName }} {{ p.phoneNumber }} </option>
          }
        </select>
      </div>

      <div class="col-12 mb-3">
        <label class="form-label fw-bold">Médecin Référent *</label>
        <select class="form-select" formControlName="doctorId" [class.is-invalid]="f['doctorId'].touched && f['doctorId'].invalid">
          <option [value]="0" disabled>-- Sélectionner le docteur --</option>
          @for (d of doctors; track d.id) {
            <option [value]="d.id">Dr. {{ d.lastName }} {{ d.phoneNumber }} </option>
          }
        </select>
      </div>

      <div class="col-12 mb-3">
        <label class="form-label fw-bold">Date et Heure *</label>
        <input 
          type="datetime-local" 
          class="form-control" 
          formControlName="createdAt" 
          placeholder="Ex: Suivi post-opératoire"
          [class.is-invalid]="f['createdAt'].touched && f['createdAt'].invalid"
        />
      </div>

    </div>
  </form>
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-secondary" (click)="dismissModal()">Annuler</button>
  <button type="button" class="btn btn-primary" (click)="save()" [disabled]="form.invalid || loading">
    @if(loading) { <span class="spinner-border spinner-border-sm me-2"></span> }
    Enregistrer
  </button>
</div>
