<div class="modal-header" >
  @if(type =="RACE" ){
     <span class="" > {{"FORM.CANCELCAUSE" | translate}}</span>  
  }@else 
   {
    <span class="" >{{"FORM.BLOCKCAUSE" | translate}}</span> 
   } 
    <button
    type="button"
    class="btn-close"
    aria-label="Close"
    (click)="dismissModal()"
  ></button>
  </div>
<div class="modal-body  bg-block" >
  <form class="rotating-svg_block  modal-form-s " [formGroup]="form">
    <div class="d-flex sb flex-wrap-s ">
  @if (type === 'RACE') {
    <div class="w-100">
      <div
        class="card_block" style="width: 98% !important;"
        [ngClass]="{ active: activeIndex === i }"
        (click)="setActive(i)"
        *ngFor="let item of causes_blockage; let i = index"
      >
        <span class="name_blockage" [ngClass]="{ active: activeIndex === i }">
          {{ item.reason }}
        </span>
        
      </div>
      <div class="mb-2 p-2">
         <label class="label_input">{{"FORM.CONTENT"|translate}} </label>
                  <div class="position-relative">
                    <textarea id="message" class="form-control custom-textarea"   [class.error-msg]="
                    message?.invalid &&
                    (message?.dirty || message?.touched) || ( form.value?.message && form.value?.message?.length>getMaxLenght())" formControlName="message" rows="5"
                      [placeholder]="'FORM.CONTENT'| translate" name="message"></textarea>
                  </div>
      </div>
    </div>
    
  }
  @else {
    <div class="w-70 ws-100 order_1">
      <div
        class="card_block"
        [ngClass]="{ active: activeIndex === i }"
        (click)="setActive(i)"
        *ngFor="let item of causes_blockage; let i = index"
      >
        <span class="name_blockage" [ngClass]="{ active: activeIndex === i }">
          {{ item.reason }}
        </span>
      </div>
    </div>
    <div class="w-30 ws-100 mt-10 ">
      <h4 class="title_parms">{{"FORM.PERIODE" | translate}}</h4>
     <div class="d-flex-s">
       <div
        class="form-check  mt-3"
        *ngFor="let option of durationOptions"
      >
        <input
          class="form-check-input"
          type="radio"
          [value]="option.value"
          formControlName="duration"
        />
        <label class="form-check-label radio_parms" [for]="option">
          {{ option.label | translate}}
        </label>
      </div>
     </div>
    </div>
   
  }
     
    </div>
    <div class="d-flex justify-content-end ">
      <button type="button" class="btn mx-1 btn-reset" (click)="dismissModal()">
        {{ "CANCEL" | translate }}
      </button>
      <button
        type="button"
        class="btn mx-1 btn_submit"
        (click)="save()"
        [disabled]="form.invalid ||  (form.value.message && form.value?.message?.length>getMaxLenght())"
      >
      {{ "SAVE" | translate }}
      </button>
    </div>
  </form>

</div>
