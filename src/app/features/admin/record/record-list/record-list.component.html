<div class=" flex-column  d-flex gap-3">
    <div class="d-flex align-items-center justify-content-between">
        <p class="title">{{ "RECORD.TITLE" |translate }}</p>

        <div class="d-flex inputs-content">
          
      <!-- ************* Boutan Ajouter un record   *************** -->
           @if(role !="PATIENT") {<button (click)="add()"
              type="button" 
              class="btn d-none-sm d-flex align-items-center gap-1 ws-100 m-1  btn-primary justify-content-center"
                >
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                    <path
                        d="M11 7V15M15 11H7M11 21C16.5228 21 21 16.5228 21 11C21 5.47715 16.5228 1 11 1C5.47715 1 1 5.47715 1 11C1 16.5228 5.47715 21 11 21Z"
                        stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                {{ "RECORD.ADD" | translate }}
            </button>}
 <!-- Bouton FILTRER avec collapse -->
            <button [ngClass]="{
                'border-blue': nbFilter > 0,
                'btn-filtre-select': isCollapseOpen
                 }"
                class="btn-filtre m-1 btn btn-light d-flex justify-content-center align-items-center gap-1 position-relative"
                type="button" data-bs-toggle="collapse" data-bs-target="#collapseFilters" aria-expanded="false"
                aria-controls="collapseFilters">
                <img src="assets/icons/filter-icon.svg">

                <span class=" d-none-sm  ">{{ "FILTRER" |translate  }}</span>
                @if(nbFilter>0){<span class="badge-circle">{{ nbFilter }}</span> }
            </button>
        </div>
    </div>
    <div class="collapse mb-3" id="collapseFilters" #filterCollapse>
        <app-filter-template  type="CLIENTS"  (formValuesChanged)="changeFilter($event)" ></app-filter-template>
    </div>
    <!--  ***************** Composant de tableau réutilisable pour l'affichage des clients *************** -->
  <div class="row my-2">
    <div class="table-responsive m-2 mt-0">
      <app-reusable-table
        [displayedColumns]="displayedColumns"
        [dataSource]="data"
        [dataColumns]="dataColumns"
       
        [totalPages]="totalPage"
        [prefixe]="prefixe"
        [numberOfDriver]="numberOfItems"
        [loading]="loading"
           [page]="page"
        [pageSize]="pageSize"

        (pagelength)="changePage($event)"
        (size)="changeSize($event)"
        (edit)="edit($event)"
        (details)="details($event)"
      ></app-reusable-table>
    </div>
  </div>

<app-btn-flottant (add)="add()"></app-btn-flottant>
